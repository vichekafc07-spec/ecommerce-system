spring:
  application:
    name: EcommerceSystem
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  jwt:
    secretKey: ${SECRET_KEY}
    accessTokenExp: ${ACCESS_TOKEN_EXP}
    refreshTokenExp: ${REFRESH_TOKEN_EXP}